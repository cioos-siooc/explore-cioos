name: Test

on:
  push:
    branches:
      - master
      - development
  pull_request:
    branches:
      - master
      - development

jobs:
  docker:
    name: Build and test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start containers
        run: |
          mv .env.sample .env
          docker compose -f "docker-compose.production.yaml" up -d --build --quiet-pull

      - name: Run ERDDAP harvester on sample dataset
        run: cp ./harvest_config.sample.yaml ./harvest_config.yaml && docker compose -f "docker-compose.production.yaml" up harvester

      - name: Install node
        uses: actions/setup-node@v3
        with:
          node-version: 16.x

      - name: Install dependencies
        working-directory: ./test
        run: |
          npm ci --quiet
          sudo apt-get update
          # Install Chromium deps for Puppeteer (minimal set)
          sudo apt-get install -y \
            libnss3 \
            libxss1 \
            libasound-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libdrm2 \
            libxcb1 \
            libxrandr2 \
            libxdamage1 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation \
            libxcomposite1 \
            libxfixes3 \
            libxext6 \
            ca-certificates \
            libxi6
          # Reduce font warnings (optional) and locale noise
          sudo apt-get install -y fonts-noto-color-emoji || true

      - name: Test API endpoints
        working-directory: ./test
        run: node test_api_endpoints.js

      - name: Test frontend loads without errors
        working-directory: ./test
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
          CI: "true"
        run: node frontend_loads_without_errors.js

      - name: Stop containers
        if: always()
        run: docker compose -f "docker-compose.production.yaml" down
