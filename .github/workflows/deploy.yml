name: Deploy

on:
  push:
    branches:
      - master
      - development
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy to ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'master' && 'production' || 'development' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'master' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: cioos-siooc/cioos-deploy-docker-compose@main
        with:
          wg_config: ${{ secrets.BELUGA_WIREGUARD_VPN_CONFIG }}
          ssh_host: "${{ secrets.SERVER_IP }}"
          ssh_username: "github-runner"
          ssh_key: ${{ secrets.BELUGA_RUNNER_PRIVATE_KEY }}
          deploy_path: "/srv/services/explore-cioos"
          stack_name: "explore-cioos-${{ (github.event.workflow_run.head_branch || github.ref_name) == 'master' && 'production' || 'development' }}"
          compose_files: "docker-compose.production.yaml"
          op_secret_files: ".env.production:.env"
          op_service_account_token: ${{ secrets.CIOOS_CO_1PASSWORD_TOKEN }}
          docker_compose_down: "true"
