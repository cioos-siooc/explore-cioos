services:
  db:
    image: "postgis/postgis:13-3.1-alpine"
    platform: linux/x86_64
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    environment:
      - "PGPORT=${DB_PORT:-5432}"
      - "POSTGRES_DB=$DB_NAME"
      - "POSTGRES_PASSWORD=$DB_PASSWORD"
      - "POSTGRES_USER=$DB_USER"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - explore-cioos_default

  web-api:
    build: ./web-api
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      - db
    networks:
      - explore-cioos_default

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/logrotate_state:/var/lib/logrotate
      - ./harvester_logs:/usr/share/nginx/html/harvester_logs:ro
      - ./downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      - web-api
    ports:
      - "$NGINX_PORT:4000"
    networks:
      - explore-cioos_default

  scheduler:
    build:
      context: .
      dockerfile: ./download_scheduler/Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./downloads:/usr/src/app/download_scheduler/downloads
    networks:
      - explore-cioos_default

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: $API_URL
        BASE_URL: $BASE_URL
    expose:
      - "80"
    networks:
      - explore-cioos_default

  # Prefect PROCESS worker: registers the work pool + deployments on startup
  # (REGISTER_DEPLOYMENTS=true), then runs harvest flows in-process. No spawned
  # flow-run containers, no docker socket. Scale with --scale prefect_worker=N.
  prefect_worker:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
    image: explore-cioos-harvester:latest
    profiles:
      - tools
    command: ["./worker-entrypoint.sh"]
    volumes:
      - ./harvest_config.yaml:/app/harvester/harvest_config.yaml
      - ./harvester_cache:/app/harvester/harvester_cache
      - ./ckan_harvester_cache:/app/harvester/ckan_harvester_cache
      - ./harvest:/app/harvester/harvest                  # resulting CSV files
      - ./harvester_logs:/app/harvester/logs              # log files (served by nginx)
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
      - HARVESTER_LOG_DIR=/app/harvester/logs
      - DB_HOST_EXTERNAL=${DB_HOST_EXTERNAL:-db}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - PREFECT_LOGGING_EXTRA_LOGGERS=populate_vernaculars,cde_db_loader,cde_harvester
      - REGISTER_DEPLOYMENTS=true
      - RUN_ON_DEPLOY=${RUN_ON_DEPLOY:-false}
      - HOST_ROOT=${HOST_ROOT}
    env_file:
      - .env
    depends_on:
      prefect:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - explore-cioos_default

  redis:
    image: "redis:alpine"
    expose:
      - "6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/var/lib/redis
      - ./redis-config/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - explore-cioos_default

  prefect:
    # Non-conda image ships asyncpg so Prefect uses Postgres (the shared db
    # service) as its metadata DB instead of SQLite, which locks under the
    # concurrent access from scaled / remote workers.
    image: prefecthq/prefect:3.6-python3.12
    command:
      - sh
      - -c
      - |
        python - <<'PY'
        import asyncio, os, asyncpg
        async def ensure_db():
            conn = await asyncpg.connect(
                host="db", port=int(os.environ.get("DB_PORT", "5432")),
                user=os.environ["DB_USER"], password=os.environ["DB_PASSWORD"],
                database=os.environ["DB_NAME"],
            )
            try:
                if not await conn.fetchval("SELECT 1 FROM pg_database WHERE datname='prefect'"):
                    await conn.execute("CREATE DATABASE prefect")
                    print("[prefect-init] created 'prefect' database")
                else:
                    print("[prefect-init] 'prefect' database already exists")
            finally:
                await conn.close()
        asyncio.run(ensure_db())
        PY
        exec prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    env_file:
      - .env
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT:-5432}/prefect
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_HOME: /root/.prefect
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    networks:
      - explore-cioos_default

volumes:
  postgres-data:
  redis-data:
  prefect_data:

networks:
  explore-cioos_default:
    external: true
