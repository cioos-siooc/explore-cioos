services:
  db:
    image: "postgis/postgis:13-3.1-alpine"
    platform: linux/x86_64
    expose:
      - "5432"
    environment:
      - "PGPORT=5432"
      - "POSTGRES_DB=$DB_NAME"
      - "POSTGRES_PASSWORD=$DB_PASSWORD"
      - "POSTGRES_USER=$DB_USER"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  web-api:
    build: ./web-api
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./harvester_logs:/usr/share/nginx/html/harvester_logs:ro
      - ./downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      - web-api
    ports:
      - "$NGINX_PORT:80"
  scheduler:
    build:
      context: .
      dockerfile: ./download_scheduler/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # APP_DOMAIN auto-derives from Coolify's injected SERVICE_URL_NGINX when present;
      # falls back to APP_DOMAIN from .env for local dev.
      - "DOWNLOAD_WAF_URL=${SERVICE_URL_NGINX:-${APP_DOMAIN}}/downloads"
    volumes:
      - ./downloads:/usr/src/app/download_scheduler/downloads
  frontend:
    build:
      context: ./frontend
      args:
        # Default to a same-origin relative path so the SPA works on whatever
        # public hostname serves it without a rebuild.
        API_URL: ${API_URL:-/api}
        BASE_URL: ${BASE_URL:-/}
    expose:
      - "80"
    depends_on:
      - web-api

  harvester:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
    profiles:
      - tools
    volumes:
      - ./harvest_config.yaml:/app/harvester/harvest_config.yaml
      - ./harvester_cache:/app/harvester/harvester_cache
      - ./harvest:/app/harvester/harvest
      - ./harvester_logs:/app/harvester/logs
    environment:
      - "HARVESTER_LOG_DIR=/app/harvester/logs"
      - "HARVEST_CONFIG_FILE=/app/harvester/harvest_config.yaml"
    env_file:
      - .env

volumes:
  postgres-data:
