services:
  db:
    build: ./database
    platform: linux/x86_64
    expose:
      - "${DB_PORT:-5432}"
    environment:
      - "PGPORT=${DB_PORT:-5432}"
      - "POSTGRES_DB=$DB_NAME"
      - "POSTGRES_PASSWORD=$DB_PASSWORD"
      - "POSTGRES_USER=$DB_USER"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  web-api:
    build: ./web-api
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
  nginx:
    build:
        context: ./nginx
        dockerfile: Dockerfile
    environment:
      - SERVICE_FQDN_NGINX_4000
    volumes:
      - nginx_logs:/var/log/nginx
      - nginx_logrotate:/var/lib/logrotate
      - harvester_logs:/usr/share/nginx/html/harvester_logs:ro
      - downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      - web-api
    expose:
      - "4000"
  scheduler:
    build:
      context: .
      dockerfile: ./download_scheduler/Dockerfile
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # APP_DOMAIN auto-derives from Coolify's injected SERVICE_URL_NGINX when present;
      # falls back to APP_DOMAIN from .env for local dev.
      - "DOWNLOAD_WAF_URL=${SERVICE_URL_NGINX:-${APP_DOMAIN}}/downloads"
    volumes:
      - downloads:/usr/src/app/download_scheduler/downloads
  frontend:
    build:
      context: ./frontend
      args:
        # Default to a same-origin relative path so the SPA works on whatever
        # public hostname serves it without a rebuild.
        API_URL: ${API_URL:-/api}
        BASE_URL: ${BASE_URL:-/}
    expose:
      - "80"
  harvester:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
      args:
        HARVEST_CONFIG_FILE: ${HARVEST_CONFIG_FILE:-harvest_config.sample.yaml}
    image: cde-harvester:latest
    profiles:
      - tools
    volumes:
      - harvester_cache:/app/harvester/harvester_cache
      - harvest_data:/app/harvester/harvest
      - harvester_logs:/app/harvester/logs
      - obis_cache:/app/harvester/obis_cache
    environment:
      - "HARVESTER_LOG_DIR=/app/harvester/logs"
      - PREFECT_API_URL=http://prefect:4200/api
      - PREFECT_LOGGING_LEVEL=INFO
      - DB_HOST_EXTERNAL=db
    env_file:
      - .env


  # One-shot: registers the cde-harvester deployment + work pool with Prefect.
  # Exits cleanly once done. Coolify will show this as "Exited (0)" — expected.
  #
  # depends_on serializes startup deliberately: Docker 29's compose
  # orchestrator hits a "No such container" race when multiple services
  # transition Starting -> Started in the same millisecond. Chaining
  # prefect_deployment behind nginx forces enough separation to avoid it.
  prefect_deployment:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
      args:
        HARVEST_CONFIG_FILE: ${HARVEST_CONFIG_FILE:-harvest_config.sample.yaml}
    image: cde-harvester:latest
    depends_on:
      prefect:
        condition: service_healthy
      nginx:
        condition: service_started
    restart: "no"
    command:
      - uv
      - run
      - python
      - -m
      - cde_harvester.prefect_pipeline
      - -f
      - harvest_config.yaml
      - -d
      - prod
    env_file:
      - .env
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      # Image tag the worker uses when spawning a flow-run container.
      HARVESTER_IMAGE: cde-harvester:latest
      DB_HOST_EXTERNAL: db
      HARVESTER_LOG_DIR: /app/harvester/logs
      PREFECT_LOGGING_LEVEL: INFO
      # Note: network name + volume prefix are derived in Python from the
      # auto-injected COOLIFY_RESOURCE_UUID (or fall back to production
      # defaults). Doing it in code rather than via ${} expansion here avoids
      # confusing Coolify's compose parser, which mis-handles nested
      # ${VAR:+...} syntax and creates spurious env-var entries.

  # Long-running: polls Prefect for work, spawns flow-run containers via the
  # docker socket. Needs the deployment to have registered first.
  prefect_worker:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
      args:
        HARVEST_CONFIG_FILE: ${HARVEST_CONFIG_FILE:-harvest_config.sample.yaml}
    image: cde-harvester:latest
    depends_on:
      prefect:
        condition: service_healthy
      prefect_deployment:
        condition: service_completed_successfully
    restart: unless-stopped
    command:
      - uv
      - run
      - prefect
      - worker
      - start
      - --pool
      - docker-pool
      - --type
      - docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Operator-managed overrides for harvest_config.yaml / Obis_Datasets.json.
      # Drop files into this named volume (via `docker cp` or `docker exec`
      # into prefect_worker) and the next flow-run container will use them
      # automatically. See cde_pipeline_run() in prefect_pipeline.py.
      - cde_overrides:/app/harvester/overrides
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      PREFECT_LOGGING_LEVEL: INFO

  prefect:
    image: prefecthq/prefect:3.6-python3.12-conda
    command: prefect server start --host 0.0.0.0
    expose:
      - "4200"  # Prefect UI + API (route via Coolify domain if external access is needed)
    environment:
      PREFECT_API_URL: http://127.0.0.1:4200/api
      # Tell the UI's JavaScript to make API calls same-origin (i.e., through
      # whatever proxy/domain the user is reaching the UI from). Without this,
      # the UI tries to hit PREFECT_API_URL directly from the browser, which
      # points at the container's own loopback and fails silently. Relative
      # path works on local + remote Coolify without knowing the FQDN.
      PREFECT_UI_API_URL: /api
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_HOME: /root/.prefect
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:alpine
    expose:
      - "6379"

  # Read-only public dashboard showing per-run harvest history for every
  # dataset on every configured ERDDAP server. Modelled on
  # https://www.ocean-ops.org/harvest/. Queries cde.harvest_runs and
  # cde.harvest_attempts, which the harvester populates via run lifecycle.
  harvest-dashboard:
    build:
      context: ./harvest-dashboard
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST_EXTERNAL=db
      - SERVICE_FQDN_HARVEST_DASHBOARD_8001
      # Internal Prefect API for the per-source "Trigger harvest" button (the
      # dashboard reaches prefect by service name on the shared compose network).
      - PREFECT_API_URL=http://prefect:4200/api
      # External Prefect UI base for the "View in Prefect" deep-links (what a
      # browser hits). Override per stack via .env / Coolify.
      - PREFECT_UI_URL=${PREFECT_UI_URL:-https://prefect-obis.cool.beluga.cioos.ca}
      # Kill-switch for the trigger button (the dashboard itself is behind
      # Cloudflare Access). Off by default.
      - HARVEST_TRIGGER_ENABLED=${HARVEST_TRIGGER_ENABLED:-false}
      - HARVEST_FLOW_NAME=${HARVEST_FLOW_NAME:-CDE Pipeline Run}
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  prefect_data:
  nginx_logs:
  nginx_logrotate:
  harvester_logs:
  downloads:
  harvester_cache:
  harvest_data:
  obis_cache:
  cde_overrides:
