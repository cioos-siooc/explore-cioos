services:
  db:
    build: ./database
    platform: linux/x86_64
    expose:
      - "${DB_PORT:-5432}"
    environment:
      - "PGPORT=${DB_PORT:-5432}"
      - "POSTGRES_DB=$DB_NAME"
      - "POSTGRES_PASSWORD=$DB_PASSWORD"
      - "POSTGRES_USER=$DB_USER"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  web-api:
    build: ./web-api
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
  nginx:
    build:
        context: ./nginx
        dockerfile: Dockerfile
    environment:
      - SERVICE_FQDN_NGINX_4000
    volumes:
      - nginx_logs:/var/log/nginx
      - nginx_logrotate:/var/lib/logrotate
      - harvester_logs:/usr/share/nginx/html/harvester_logs:ro
      - downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      - web-api
    expose:
      - "4000"
  scheduler:
    build:
      context: .
      dockerfile: ./download_scheduler/Dockerfile
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # APP_DOMAIN auto-derives from Coolify's injected SERVICE_URL_NGINX when present;
      # falls back to APP_DOMAIN from .env for local dev.
      - "DOWNLOAD_WAF_URL=${SERVICE_URL_NGINX:-${APP_DOMAIN}}/downloads"
    volumes:
      - downloads:/usr/src/app/download_scheduler/downloads
  frontend:
    build:
      context: ./frontend
      args:
        # Default to a same-origin relative path so the SPA works on whatever
        # public hostname serves it without a rebuild.
        API_URL: ${API_URL:-/api}
        BASE_URL: ${BASE_URL:-/}
    expose:
      - "80"


  harvester:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
    image: cde-harvester:latest
    profiles:
      - tools
    volumes:
      - harvester_cache:/app/harvester/harvester_cache
      - harvest_data:/app/harvester/harvest
      - harvester_logs:/app/harvester/logs
      - obis_cache:/app/harvester/obis_cache
    environment:
      - "HARVESTER_LOG_DIR=/app/harvester/logs"
      - PREFECT_API_URL=http://prefect:4200/api
      - PREFECT_LOGGING_LEVEL=INFO
      - DB_HOST_EXTERNAL=db
    env_file:
      - .env


  # One-shot: registers the cde-harvester deployment + work pool with Prefect.
  # Exits cleanly once done. Coolify will show this as "Exited (0)" — expected.
  prefect_deployment:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
    image: cde-harvester:latest
    depends_on:
      prefect:
        condition: service_healthy
    restart: "no"
    command:
      - uv
      - run
      - python
      - -m
      - cde_harvester.prefect_pipeline
      - -f
      - harvest_config.yaml
      - -d
      - prod
    env_file:
      - .env
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      # Network the spawned flow-run containers should join so they can reach
      # db / redis / prefect. Defaults to production's name; Coolify overrides
      # via COOLIFY_RESOURCE_UUID.
      PREFECT_DOCKER_NETWORK: ${COOLIFY_RESOURCE_UUID:-explore-cioos_default}
      # Image tag the worker uses when spawning a flow-run container.
      HARVESTER_IMAGE: cde-harvester:latest
      # Empty -> bind-mount via HOST_ROOT (production). Set to "<uuid>_" under
      # Coolify so the spawned containers attach Coolify's project-scoped
      # named volumes (harvester-cache, harvest-data, harvester-logs, obis-cache).
      PREFECT_VOLUME_PREFIX: ${COOLIFY_RESOURCE_UUID:+${COOLIFY_RESOURCE_UUID}_}
      DB_HOST_EXTERNAL: db
      HARVESTER_LOG_DIR: /app/harvester/logs
      PREFECT_LOGGING_LEVEL: INFO

  # Long-running: polls Prefect for work, spawns flow-run containers via the
  # docker socket. Needs the deployment to have registered first.
  prefect_worker:
    build:
      context: .
      dockerfile: ./harvester/Dockerfile
    image: cde-harvester:latest
    depends_on:
      prefect:
        condition: service_healthy
      prefect_deployment:
        condition: service_completed_successfully
    restart: unless-stopped
    command:
      - uv
      - run
      - prefect
      - worker
      - start
      - --pool
      - docker-pool
      - --type
      - docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      PREFECT_LOGGING_LEVEL: INFO

  prefect:
    image: prefecthq/prefect:3.6-python3.12-conda
    command: prefect server start --host 0.0.0.0
    expose:
      - "4200"  # Prefect UI + API (route via Coolify domain if external access is needed)
    environment:
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_HOME: /root/.prefect
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:alpine
    expose:
      - "6379"

volumes:
  postgres-data:
  prefect_data:
  nginx_logs:
  nginx_logrotate:
  harvester_logs:
  downloads:
  harvester_cache:
  harvest_data:
  obis_cache:
