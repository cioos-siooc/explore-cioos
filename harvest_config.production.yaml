# list of erddap URLs. Should end in /erddap
erddap_urls:
  - https://data.cioospacific.ca/erddap
  - https://seagull-erddap.glos.org/erddap
  - https://erddap.amundsenscience.com/erddap
  - https://erddap.ogsl.ca/erddap
  - https://www.smartatlantic.ca/erddap
  - https://catalogue.hakai.org/erddap
  - https://dap.oceannetworks.ca/erddap
  - https://data.ceotr.ca/erddap
  - https://cioosatlantic.ca/erddap

# set to true to test with caching. Not available in production docker compose file
# defaults to false
cache: false

# defaults to 'harvest'
folder:

# use to test select datasets, eg: dataset_one,dataset_two
dataset_ids:
# defaults to false
log_time: true

# Directory to save log files (optional)
# Use absolute path for Docker: /app/harvester/logs
# Use relative path for local: ../harvester_logs
log_dir: ../harvester_logs
